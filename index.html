<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Pro Practice Metronome + Mastery</title>
	<style>
		:root {
			--primary: #007bff;
			--bg: #0e0e0e;
			--card: #151515;
			--text: #eee;
			--container-width: 450px;
			--success-glow: rgba(40, 167, 69, 0.2);
			--fail-glow: rgba(220, 53, 69, 0.1);
			--success-text: #28a745;
			--fail-text: #dc3545;
		}

		body {
			margin: 0;
			background: var(--bg);
			color: var(--text);
			font-family: system-ui, -apple-system, sans-serif;
			display: flex;
			justify-content: center;
			overflow-x: hidden;
			-webkit-tap-highlight-color: transparent;
		}

		#builder,
		#player {
			width: 100%;
			max-width: var(--container-width);
			min-height: 100vh;
			padding: 20px;
			box-sizing: border-box;
			position: relative;
		}

		#mastery-layer {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			display: flex;
			z-index: 1;
			pointer-events: none;
		}

		.mastery-zone {
			flex: 1;
			height: 100%;
			pointer-events: auto;
			cursor: pointer;
			transition: background 0.2s;
		}

		.success-flash { background: var(--success-glow); }
		.fail-flash { background: var(--fail-glow); }

		.stats-overlay {
			position: absolute;
			top: 70px;
			width: 100%;
			display: flex;
			justify-content: space-around;
			z-index: 5;
			pointer-events: none;
		}

		.stat-block { text-align: center; }

		.stat-label {
			font-size: 9px;
			letter-spacing: 2px;
			color: #555;
			margin-bottom: 2px;
			text-transform: uppercase;
			font-weight: 800;
		}

		.stat-val {
			font-size: 28px;
			font-weight: 800;
		}

		#success-count { color: var(--success-text); opacity: 0.9; }
		#fail-count { color: var(--fail-text); opacity: 0.8; }
		#accuracy-box { color: var(--primary); }

		header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 30px;
			position: relative;
			z-index: 10;
		}

		.practice {
			border: 1px solid #333;
			padding: 20px;
			margin-bottom: 20px;
			border-radius: 16px;
			background: var(--card);
			position: relative;
		}

		/* Met row: drag handle | name | bpm | dur | ramp | remove */
		.met {
			border-left: 4px solid var(--primary);
			padding: 10px 8px;
			margin: 10px 0;
			background: #1c1c1c;
			border-radius: 4px;
		}

		.met-row {
			display: grid;
			grid-template-columns: 22px 2fr 1fr 1fr 30px;
			gap: 6px;
			align-items: center;
		}

		.met-ramp-row {
			display: none;
			align-items: center;
			gap: 8px;
			margin-top: 6px;
			padding-left: 28px;
			font-size: 11px;
			color: #555;
		}

		.met-ramp-row.visible { display: flex; }

		.met-ramp-row input[type="number"] {
			width: 70px;
		}

		.drag-handle {
			cursor: grab;
			color: #444;
			font-size: 14px;
			user-select: none;
			touch-action: none;
			text-align: center;
			line-height: 1;
		}

		.drag-handle:active { cursor: grabbing; }

		/* Name field — locked by default, unlocked on long-press */
		.met-name {
			background: #222;
			color: #fff;
			border: 1px solid transparent;
			padding: 10px 5px;
			border-radius: 8px;
			font-size: 13px;
			width: 100%;
			box-sizing: border-box;
			pointer-events: none;
			user-select: none;
			cursor: default;
			transition: border-color 0.2s;
		}

		.met-name.unlocked {
			pointer-events: auto;
			user-select: text;
			cursor: text;
			border-color: var(--primary);
		}

		.met.dragging {
			opacity: 0.4;
		}

		.met.drag-over {
			border-left-color: #fff;
			background: #252525;
		}

		input {
			background: #222;
			color: #fff;
			border: 1px solid #444;
			padding: 10px 5px;
			border-radius: 8px;
			font-size: 13px;
			width: 100%;
			box-sizing: border-box;
		}

		#player {
			display: none;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 20px;
		}

		#bpm-display {
			font-size: 85px;
			font-weight: 800;
			color: var(--primary);
			line-height: 1;
			margin: 5px 0;
			position: relative;
			z-index: 10;
		}

		.knob-container {
			width: 170px;
			height: 170px;
			position: relative;
			z-index: 10;
			cursor: ns-resize;
			touch-action: none;
		}

		.knob {
			width: 100%;
			height: 100%;
			border-radius: 50%;
			background: radial-gradient(circle at 30% 30%, #333, #111);
			border: 4px solid #252525;
			position: relative;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
			transition: transform 0.1s;
		}

		.knob-indicator {
			position: absolute;
			width: 5px;
			height: 18%;
			background: var(--primary);
			left: 50%;
			top: 8%;
			transform: translateX(-50%);
			border-radius: 10px;
		}

		.dot {
			width: 14px;
			height: 14px;
			background: #1a1a1a;
			border-radius: 50%;
			border: 1px solid #222;
			display: inline-block;
			margin: 0 5px;
		}

		.dot.active-accent {
			background: var(--primary);
			box-shadow: 0 0 15px var(--primary);
		}

		.dot.active-normal {
			background: #eee;
			box-shadow: 0 0 10px #eee;
		}

		.big-controls {
			display: flex;
			gap: 20px;
			align-items: center;
			position: relative;
			z-index: 10;
		}

		.btn-circle {
			width: 62px;
			height: 62px;
			border-radius: 50%;
			font-size: 22px;
			background: #1a1a1a;
			color: #eee;
			border: 1px solid #333;
			cursor: pointer;
		}

		.btn-play {
			width: 82px;
			height: 82px;
			background: var(--primary);
			border: none;
			font-size: 32px;
			color: white;
		}

		.bottom-meta {
			margin-top: 10px;
			width: 100%;
			z-index: 10;
		}

		.nav-btns {
			display: flex;
			justify-content: center;
			gap: 40px;
			margin-bottom: 12px;
		}

		button {
			cursor: pointer;
			transition: opacity 0.2s;
		}

		button:active { opacity: 0.6; }

		#modal-overlay {
			display: none;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.9);
			z-index: 1000;
			justify-content: center;
			align-items: center;
		}

		.modal {
			background: #151515;
			padding: 30px;
			border-radius: 20px;
			text-align: center;
			max-width: 280px;
			border: 1px solid #333;
		}

		/* Progress bar */
		#progress-bar-wrap {
			width: 100%;
			max-width: 300px;
			height: 4px;
			background: #222;
			border-radius: 2px;
			overflow: hidden;
			position: relative;
			z-index: 10;
		}

		#progress-bar {
			height: 100%;
			background: var(--primary);
			width: 100%;
			transition: width 1s linear;
			border-radius: 2px;
		}

		/* Volume slider */
		#volume-wrap {
			display: flex;
			align-items: center;
			gap: 10px;
			z-index: 10;
			width: 100%;
			max-width: 300px;
		}

		#volume-wrap span {
			font-size: 10px;
			color: #444;
			font-weight: 800;
			letter-spacing: 1px;
			white-space: nowrap;
		}

		#volumeSlider {
			-webkit-appearance: none;
			appearance: none;
			flex: 1;
			height: 4px;
			background: #333;
			border-radius: 2px;
			outline: none;
			border: none;
			padding: 0;
		}

		#volumeSlider::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 18px;
			height: 18px;
			border-radius: 50%;
			background: var(--primary);
			cursor: pointer;
		}

		#volumeSlider::-moz-range-thumb {
			width: 18px;
			height: 18px;
			border-radius: 50%;
			background: var(--primary);
			cursor: pointer;
			border: none;
		}

		/* Ramp toggle button inside met row */
		.ramp-toggle {
			background: none;
			border: 1px solid #333;
			color: #444;
			font-size: 9px;
			font-weight: 800;
			border-radius: 4px;
			padding: 4px 5px;
			letter-spacing: 0.5px;
			white-space: nowrap;
			width: 100%;
		}

		.ramp-toggle.active {
			border-color: var(--primary);
			color: var(--primary);
		}
	</style>
</head>

<body>

	<div id="modal-overlay">
		<div class="modal">
			<h3 style="margin-top:0">Delete Routine?</h3>
			<div style="display:flex; gap:10px; margin-top:20px;">
				<button onclick="closeModal()" style="flex:1; padding:12px; background:#333; color:#fff; border:none; border-radius:8px;">CANCEL</button>
				<button id="confirmDelete" style="flex:1; padding:12px; background:#ff4444; color:#fff; border:none; border-radius:8px;">DELETE</button>
			</div>
		</div>
	</div>

	<div id="builder">
		<header>
			<h1 style="letter-spacing:-1px">METRONOME</h1>
			<button id="addPracticeBtn" style="background: var(--primary); padding: 10px 22px; border-radius: 25px; color: white; border:none; font-weight: 800; font-size: 13px;">+ NEW</button>
		</header>
		<div id="app"></div>
	</div>

	<div id="player">
		<div id="mastery-layer">
			<div id="success-zone" class="mastery-zone"></div>
			<div id="fail-zone" class="mastery-zone"></div>
		</div>

		<div class="stats-overlay" id="stats-ui">
			<div class="stat-block">
				<div class="stat-label">SUCCESS</div>
				<div id="success-count" class="stat-val">0</div>
			</div>
			<div class="stat-block">
				<div class="stat-label">ACC</div>
				<div id="accuracy-box" class="stat-val">0%</div>
			</div>
			<div class="stat-block">
				<div class="stat-label">FAIL</div>
				<div id="fail-count" class="stat-val">0</div>
			</div>
		</div>

		<div style="text-align: center; z-index:10;">
			<div id="label" style="font-weight: 800; letter-spacing: 2px; color: #444; font-size: 10px; margin-bottom: 10px; text-transform: uppercase;">SECTION NAME</div>
			<div class="beat-container">
				<div class="dot" id="dot-0"></div>
				<div class="dot" id="dot-1"></div>
				<div class="dot" id="dot-2"></div>
				<div class="dot" id="dot-3"></div>
			</div>
		</div>

		<div class="knob-container" id="knobContainer">
			<div class="knob" id="knob">
				<div class="knob-indicator"></div>
			</div>
		</div>

		<div style="text-align: center; z-index:10;">
			<div id="bpm-display">120</div>
			<div id="remaining" style="font-family: monospace; font-size: 24px; color: #555; font-weight: 800;">00s</div>
		</div>

		<!-- Progress bar -->
		<div id="progress-bar-wrap">
			<div id="progress-bar"></div>
		</div>

		<!-- Volume control -->
		<div id="volume-wrap">
			<span>VOL</span>
			<input type="range" id="volumeSlider" min="0" max="3" step="0.01" value="0.8">
			<span id="volume-pct">80%</span>
		</div>

		<div class="big-controls">
			<button id="minus" class="btn-circle">−</button>
			<button id="playPause" class="btn-circle btn-play">II</button>
			<button id="plus" class="btn-circle">+</button>
		</div>

		<div class="bottom-meta">
			<div class="nav-btns">
				<button id="prevBtn" style="background:none; border:none; color:#444; font-weight: 900; font-size:12px;">PREV</button>
				<button id="nextBtn" style="background:none; border:none; color:#444; font-weight: 900; font-size:12px;">NEXT</button>
			</div>
			<div id="upcoming-details" style="font-size: 10px; color: #333; text-align: center; margin-bottom: 15px; text-transform: uppercase; font-weight: 700;">--</div>

			<div style="display:flex; justify-content:center; gap:15px;">
				<button id="toggleStats" style="background:#151515; border:1px solid #333; color:#555; padding:6px 12px; border-radius:20px; font-size:9px; font-weight: 800;">STATS: ON</button>
				<button id="resetStats" style="background:#151515; border:1px solid #333; color:#555; padding:6px 12px; border-radius:20px; font-size:9px; font-weight: 800;">RESET</button>
			</div>

			<button id="stop" style="display:block; margin: 20px auto 0; background:none; border:none; color:#333; font-size: 11px; font-weight: 900; letter-spacing:1px;">EXIT</button>
		</div>
	</div>

	<script>
		let practices = JSON.parse(localStorage.getItem("practices") || "[]");
		let counts = JSON.parse(localStorage.getItem("masteryCounts") || '{"s":0, "f":0}');
		let showStats = localStorage.getItem("showStats") !== "false";
		let metVolume = parseFloat(localStorage.getItem("metVolume") || "0.8");

		const save = () => {
			localStorage.setItem("practices", JSON.stringify(practices));
			localStorage.setItem("masteryCounts", JSON.stringify(counts));
			localStorage.setItem("showStats", showStats);
			localStorage.setItem("metVolume", metVolume);
		};

		let audioCtx, nextTickTime = 0, schedulerInterval, countdownInterval;
		let currentBPM = 120, activePractice = null, activeMetIndex = -1;
		let beatCounter = 0, isPaused = false, timeLeftInSection = 0, totalSectionTime = 0;
		let sectionStartBPM = 120, sectionEndBPM = 120, isRamping = false;

		function init() {
			render();
			updateMasteryUI();
			applyStatsVisibility();
			// Restore volume slider
			const slider = document.getElementById('volumeSlider');
			slider.value = metVolume;
			document.getElementById('volume-pct').textContent = Math.round((metVolume / 3) * 100) + '%';
		}

		function updateMasteryUI() {
			document.getElementById('success-count').textContent = counts.s;
			document.getElementById('fail-count').textContent = counts.f;
			const total = counts.s + counts.f;
			const acc = total === 0 ? 0 : Math.round((counts.s / total) * 100);
			document.getElementById('accuracy-box').textContent = acc + "%";
			document.getElementById('accuracy-box').style.opacity = acc >= 80 ? '1' : '0.6';
		}

		function applyStatsVisibility() {
			document.getElementById('stats-ui').style.display = showStats ? 'flex' : 'none';
			document.getElementById('mastery-layer').style.display = showStats ? 'flex' : 'none';
			document.getElementById('toggleStats').textContent = `STATS: ${showStats ? 'ON' : 'OFF'}`;
		}

		document.getElementById('success-zone').onclick = () => {
			counts.s++;
			flashZone('success-zone', 'success-flash');
			save();
			updateMasteryUI();
		};
		document.getElementById('fail-zone').onclick = () => {
			counts.f++;
			flashZone('fail-zone', 'fail-flash');
			save();
			updateMasteryUI();
		};

		function flashZone(id, cls) {
			const el = document.getElementById(id);
			el.classList.add(cls);
			setTimeout(() => el.classList.remove(cls), 150);
		}

		document.getElementById('resetStats').onclick = () => {
			counts = { s: 0, f: 0 };
			save();
			updateMasteryUI();
		};
		document.getElementById('toggleStats').onclick = () => {
			showStats = !showStats;
			applyStatsVisibility();
			save();
		};

		// Volume slider
		document.getElementById('volumeSlider').oninput = (e) => {
			metVolume = parseFloat(e.target.value);
			document.getElementById('volume-pct').textContent = Math.round((metVolume / 3) * 100) + '%';
			save();
		};

		// Audio Engine
		function initAudio() {
			if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
			if (audioCtx.state === 'suspended') audioCtx.resume();
		}

		function playClick(time, accented) {
			const osc = audioCtx.createOscillator();
			const gain = audioCtx.createGain();
			osc.type = 'triangle';
			osc.frequency.setValueAtTime(accented ? 1600 : 900, time);
			gain.gain.setValueAtTime(metVolume, time);
			gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
			osc.connect(gain);
			gain.connect(audioCtx.destination);
			osc.start(time);
			osc.stop(time + 0.1);
		}

		function lightUpDot(beatIndex) {
			document.querySelectorAll('.dot').forEach(d => d.className = 'dot');
			const dot = document.getElementById(`dot-${beatIndex}`);
			if (dot) dot.classList.add(beatIndex === 0 ? 'active-accent' : 'active-normal');
		}

		function scheduler() {
			if (isPaused) return;
			while (nextTickTime < audioCtx.currentTime + 0.1) {
				const beat = beatCounter % 4;
				playClick(nextTickTime, beat === 0);
				// Ramp: interpolate BPM based on how far through the section we are
				if (isRamping && totalSectionTime > 0) {
					const elapsed = totalSectionTime - timeLeftInSection;
					const t = Math.min(elapsed / totalSectionTime, 1);
					currentBPM = Math.round(sectionStartBPM + (sectionEndBPM - sectionStartBPM) * t);
					adjustBPMDisplay();
				}
				nextTickTime += 60 / currentBPM;
				const capturedBeat = beat;
				const capturedTime = nextTickTime;
				setTimeout(() => {
					if (!isPaused) lightUpDot(capturedBeat);
				}, (nextTickTime - audioCtx.currentTime) * 1000 - 60 / currentBPM * 1000);
				beatCounter++;
			}
		}

		function runSection(index) {
			if (!activePractice || index >= activePractice.metronomes.length) {
				if (activePractice?.loop) return runSection(0);
				return stopEverything();
			}
			activeMetIndex = index;
			const met = activePractice.metronomes[index];
			sectionStartBPM = met.startBPM;
			sectionEndBPM = met.ramp ? met.endBPM : met.startBPM;
			isRamping = met.ramp && met.endBPM && met.endBPM !== met.startBPM;
			currentBPM = sectionStartBPM;
			timeLeftInSection = met.duration;
			totalSectionTime = met.duration;
			adjustBPMDisplay();
			updatePlayerUI();
			beatCounter = 0;
			nextTickTime = audioCtx.currentTime;
			updateProgressBar(1);

			if (!schedulerInterval) schedulerInterval = setInterval(scheduler, 25);
			startCountdown();
		}

		function startCountdown() {
			clearInterval(countdownInterval);
			document.getElementById("remaining").textContent = `${timeLeftInSection}s`;
			countdownInterval = setInterval(() => {
				if (!isPaused) {
					timeLeftInSection--;
					document.getElementById("remaining").textContent = `${Math.max(0, timeLeftInSection)}s`;
					const fraction = totalSectionTime > 0 ? timeLeftInSection / totalSectionTime : 0;
					updateProgressBar(fraction);
					if (timeLeftInSection <= 0) {
						clearInterval(countdownInterval);
						runSection(activeMetIndex + 1);
					}
				}
			}, 1000);
		}

		function updateProgressBar(fraction) {
			document.getElementById('progress-bar').style.width = (fraction * 100) + '%';
		}

		function adjustBPMDisplay() {
			currentBPM = Math.round(Math.max(20, Math.min(300, currentBPM)));
			const rotation = ((currentBPM - 20) / (300 - 20) * 300) - 150;
			document.getElementById('knob').style.transform = `rotate(${rotation}deg)`;
			document.getElementById("bpm-display").textContent = currentBPM;
		}

		function adjustBPM(amount) {
			currentBPM = Math.round(Math.max(20, Math.min(300, currentBPM + amount)));
			// If ramping, adjusting manually disables ramp for this section
			isRamping = false;
			adjustBPMDisplay();
		}

		function updatePlayerUI() {
			if (activeMetIndex === -1) return;
			const met = activePractice.metronomes[activeMetIndex];
			let labelText = met.name;
			if (met.ramp && met.endBPM) labelText += ` (${met.startBPM}→${met.endBPM})`;
			document.getElementById("label").textContent = labelText;
			const next = activePractice.metronomes[activeMetIndex + 1] || (activePractice.loop ? activePractice.metronomes[0] : null);
			document.getElementById("upcoming-details").textContent = next ? `NEXT: ${next.name} (${next.startBPM} BPM)` : "FINAL PART";
		}

		function stopEverything() {
			isPaused = false;
			clearInterval(schedulerInterval);
			clearInterval(countdownInterval);
			schedulerInterval = null;
			document.getElementById("builder").style.display = "block";
			document.getElementById("player").style.display = "none";
			render();
		}

		// ── Drag-to-reorder state ──────────────────────────────────────────────
		let dragSrcPIdx = null, dragSrcMIdx = null;

		function onDragStart(e, pIdx, mIdx) {
			dragSrcPIdx = pIdx;
			dragSrcMIdx = mIdx;
			e.dataTransfer.effectAllowed = 'move';
			setTimeout(() => e.target.closest('.met').classList.add('dragging'), 0);
		}

		function onDragEnd(e) {
			document.querySelectorAll('.met').forEach(el => {
				el.classList.remove('dragging', 'drag-over');
			});
		}

		function onDragOver(e, pIdx, mIdx) {
			e.preventDefault();
			e.dataTransfer.dropEffect = 'move';
			document.querySelectorAll('.met').forEach(el => el.classList.remove('drag-over'));
			e.currentTarget.classList.add('drag-over');
		}

		function onDrop(e, pIdx, mIdx) {
			e.preventDefault();
			if (dragSrcPIdx !== pIdx || dragSrcMIdx === mIdx) return;
			const arr = practices[pIdx].metronomes;
			const [moved] = arr.splice(dragSrcMIdx, 1);
			arr.splice(mIdx, 0, moved);
			save();
			render();
		}

		// ── Touch drag-to-reorder ──────────────────────────────────────────────
		let touchDragPIdx = null, touchDragMIdx = null, touchDragEl = null, touchClone = null;

		function onTouchDragStart(e, pIdx, mIdx) {
			// Only start drag from the handle
			touchDragPIdx = pIdx;
			touchDragMIdx = mIdx;
			touchDragEl = e.currentTarget.closest('.met');

			const rect = touchDragEl.getBoundingClientRect();
			touchClone = touchDragEl.cloneNode(true);
			touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.7;pointer-events:none;z-index:9999;`;
			document.body.appendChild(touchClone);
			touchDragEl.classList.add('dragging');
			e.preventDefault();
		}

		function onTouchDragMove(e) {
			if (!touchClone) return;
			const touch = e.touches[0];
			touchClone.style.left = (touch.clientX - touchClone.offsetWidth / 2) + 'px';
			touchClone.style.top = (touch.clientY - 20) + 'px';

			document.querySelectorAll('.met').forEach(el => el.classList.remove('drag-over'));
			const el = document.elementFromPoint(touch.clientX, touch.clientY);
			const target = el && el.closest('.met');
			if (target) target.classList.add('drag-over');
			e.preventDefault();
		}

		function onTouchDragEnd(e) {
			if (!touchClone) return;
			const touch = e.changedTouches[0];
			const el = document.elementFromPoint(touch.clientX, touch.clientY);
			const target = el && el.closest('.met');

			if (target) {
				const dropMIdx = parseInt(target.dataset.midx);
				const dropPIdx = parseInt(target.dataset.pidx);
				if (dropPIdx === touchDragPIdx && dropMIdx !== touchDragMIdx) {
					const arr = practices[touchDragPIdx].metronomes;
					const [moved] = arr.splice(touchDragMIdx, 1);
					arr.splice(dropMIdx, 0, moved);
					save();
				}
			}

			touchClone.remove();
			touchClone = null;
			if (touchDragEl) touchDragEl.classList.remove('dragging');
			document.querySelectorAll('.met').forEach(el => el.classList.remove('drag-over'));
			render();
		}

		// ── Long-press to unlock name field ───────────────────────────────────
		let longPressTimer = null;

		function startLongPress(e, nameInput) {
			longPressTimer = setTimeout(() => {
				nameInput.classList.add('unlocked');
				nameInput.focus();
			}, 500);
		}

		function cancelLongPress() {
			clearTimeout(longPressTimer);
		}

		function render() {
			const app = document.getElementById("app");
			app.innerHTML = "";
			practices.forEach((p, pIdx) => {
				const card = document.createElement("div");
				card.className = "practice";
				card.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                    <input type="text" value="${p.name}" onchange="practices[${pIdx}].name=this.value;save();" style="font-weight:900;border:none;background:transparent;color:var(--primary);width:60%">
                    <div style="display:flex;gap:12px;align-items:center;">
                        <span style="font-size:9px;font-weight:900;color:#444">LOOP</span>
                        <input type="checkbox" ${p.loop ? 'checked' : ''} onchange="practices[${pIdx}].loop=this.checked;save();" style="width:16px;height:16px;">
                        <button onclick="openDeleteModal(${pIdx})" style="background:none;border:none;color:#555;font-size:16px;">🗑</button>
                    </div>
                </div>`;

				p.metronomes.forEach((m, mIdx) => {
					const mDiv = document.createElement("div");
					mDiv.className = "met";
					mDiv.draggable = true;
					mDiv.dataset.pidx = pIdx;
					mDiv.dataset.midx = mIdx;

					// Desktop drag events
					mDiv.addEventListener('dragstart', (e) => onDragStart(e, pIdx, mIdx));
					mDiv.addEventListener('dragend', onDragEnd);
					mDiv.addEventListener('dragover', (e) => onDragOver(e, pIdx, mIdx));
					mDiv.addEventListener('drop', (e) => onDrop(e, pIdx, mIdx));

					const rampActive = m.ramp ? 'active' : '';
					const rampVisible = m.ramp ? 'visible' : '';

					mDiv.innerHTML = `
						<div class="met-row">
							<span class="drag-handle" title="Hold to drag">⠿</span>
							<input class="met-name" type="text" value="${m.name}" onchange="practices[${pIdx}].metronomes[${mIdx}].name=this.value;save();" onblur="this.classList.remove('unlocked')">
							<input type="number" value="${m.startBPM}" min="20" max="300" step="1" placeholder="BPM" onchange="practices[${pIdx}].metronomes[${mIdx}].startBPM=parseInt(this.value);save();">
							<input type="number" value="${m.duration}" min="1" step="1" placeholder="SEC" onchange="practices[${pIdx}].metronomes[${mIdx}].duration=parseInt(this.value);save();">
							<button onclick="practices[${pIdx}].metronomes.splice(${mIdx},1);save();render();" style="border:none;background:none;color:#444">✕</button>
						</div>
						<div class="met-row" style="margin-top:6px;">
							<span></span>
							<button class="ramp-toggle ${rampActive}" onclick="practices[${pIdx}].metronomes[${mIdx}].ramp=!practices[${pIdx}].metronomes[${mIdx}].ramp;save();render();">RAMP ${m.ramp ? 'ON' : 'OFF'}</button>
							<span></span><span></span><span></span>
						</div>
						<div class="met-ramp-row ${rampVisible}" id="ramp-row-${pIdx}-${mIdx}">
							<span>End BPM</span>
							<input type="number" value="${m.endBPM || m.startBPM}" min="20" max="300" step="1" onchange="practices[${pIdx}].metronomes[${mIdx}].endBPM=parseInt(this.value);save();">
						</div>`;

					// Touch drag — only from handle
					const handle = mDiv.querySelector('.drag-handle');
					handle.addEventListener('touchstart', (e) => onTouchDragStart(e, pIdx, mIdx), { passive: false });

					// Long-press to unlock name
					const nameInput = mDiv.querySelector('.met-name');
					nameInput.addEventListener('mousedown', (e) => startLongPress(e, nameInput));
					nameInput.addEventListener('touchstart', (e) => startLongPress(e, nameInput), { passive: true });
					nameInput.addEventListener('mouseup', cancelLongPress);
					nameInput.addEventListener('touchend', cancelLongPress);
					nameInput.addEventListener('mouseleave', cancelLongPress);

					card.appendChild(mDiv);
				});

				const addSectionBtn = document.createElement("button");
				addSectionBtn.textContent = "+ ADD SECTION";
				addSectionBtn.style.cssText = "width:100%;padding:10px;margin-top:10px;border-radius:12px;background:none;color:#555;border:1px dashed #333;font-weight:900;letter-spacing:1px;font-size:11px";
				addSectionBtn.onclick = () => {
					practices[pIdx].metronomes.push({ name: "Exercise", startBPM: 100, duration: 60, ramp: false });
					save();
					render();
				};
				card.appendChild(addSectionBtn);

				const startBtn = document.createElement("button");
				startBtn.textContent = "START ROUTINE";
				startBtn.style.cssText = "width:100%;padding:14px;margin-top:10px;border-radius:12px;background:var(--primary);color:white;border:none;font-weight:900;letter-spacing:1px;font-size:12px";
				startBtn.onclick = () => {
					document.getElementById("builder").style.display = "none";
					document.getElementById("player").style.display = "flex";
					initAudio();
					activePractice = p;
					isPaused = false;
					runSection(0);
				};
				card.appendChild(startBtn);
				app.appendChild(card);
			});

			// Wire up touch drag move/end globally
			window.ontouchmove = onTouchDragMove;
			window.ontouchend = onTouchDragEnd;
		}

		// Controls
		let isDragging = false, lastY = 0;
		document.getElementById('knobContainer').onmousedown = (e) => {
			isDragging = true;
			lastY = e.clientY;
			initAudio();
		};
		window.onmousemove = (e) => {
			if (isDragging) {
				adjustBPM(lastY - e.clientY);
				lastY = e.clientY;
			}
		};
		window.onmouseup = () => isDragging = false;

		document.getElementById('knobContainer').addEventListener('touchstart', (e) => {
			isDragging = true;
			lastY = e.touches[0].clientY;
			initAudio();
			e.preventDefault();
		}, { passive: false });
		window.addEventListener('touchmove', (e) => {
			if (isDragging) {
				adjustBPM(lastY - e.touches[0].clientY);
				lastY = e.touches[0].clientY;
				e.preventDefault();
			}
		}, { passive: false });
		window.addEventListener('touchend', () => isDragging = false);

		let pendingDeleteIndex = null;

		function openDeleteModal(i) {
			pendingDeleteIndex = i;
			document.getElementById('modal-overlay').style.display = 'flex';
		}

		function closeModal() {
			document.getElementById('modal-overlay').style.display = 'none';
		}

		document.getElementById('confirmDelete').onclick = () => {
			practices.splice(pendingDeleteIndex, 1);
			save();
			render();
			closeModal();
		};

		document.getElementById('addPracticeBtn').onclick = () => {
			practices.push({
				name: "New Routine",
				loop: false,
				metronomes: [{ name: "Exercise 1", startBPM: 100, duration: 60, ramp: false }]
			});
			save();
			render();
		};

		document.getElementById("playPause").onclick = () => {
			isPaused = !isPaused;
			document.getElementById("playPause").textContent = isPaused ? "▶" : "II";
		};
		document.getElementById("plus").onclick = () => adjustBPM(1);
		document.getElementById("minus").onclick = () => adjustBPM(-1);
		document.getElementById("stop").onclick = stopEverything;
		document.getElementById("nextBtn").onclick = () => runSection(activeMetIndex + 1);
		document.getElementById("prevBtn").onclick = () => runSection(activeMetIndex - 1);

		init();
	</script>
</body>

</html>
